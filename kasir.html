<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Ayam Pencak</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen overflow-hidden flex">

    <aside class="w-20 lg:w-64 bg-white border-r border-gray-200 flex flex-col transition-all">
        <div class="p-6">
    <div class="flex items-center gap-3">
        <div id="logo-container">
            <img src="asset\logo.png" id="logo-asset" alt="Logo Ayam Pencak">
        </div>
        
        <div class="hidden lg:block overflow-hidden text-nowrap">
            <h1 class="text-sm font-black text-gray-800 leading-none uppercase tracking-tighter">Ayam Pencak</h1>
            <span class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Point of Sale</span>
        </div>
    </div>
</div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
<a href="index.html" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-semibold transition text-gray-400 hover:bg-gray-50">
        <i class="fas fa-chart-pie w-5"></i>
        <span class="hidden lg:block">Dashboard</span>
    </a>
    <a href="kasir.html" class="nav-item active w-full flex items-center gap-4 px-4 py-3 rounded-xl font-semibold transition">
        <i class="fas fa-th-large w-5"></i>
        <span class="hidden lg:block">Kasir</span>
    </a>
    <a href="stok.html" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-semibold transition text-gray-400 hover:bg-gray-50">

        <i class="fas fa-boxes w-5"></i>
        <span class="hidden lg:block">Stok Bahan</span>
    </a>
    <a href="laporan.html" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-semibold transition text-gray-400 hover:bg-gray-50">
        <i class="fas fa-file-invoice-dollar w-5"></i>
        <span class="hidden lg:block">Laporan</span>
    </a>

</nav>

        <div class="p-4 border-t border-gray-100">
            <button class="w-full flex items-center gap-4 px-4 py-3 text-gray-400 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt w-5"></i>
                <span class="hidden lg:block">Tutup Outlet</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex overflow-hidden">
        
        <div id="kasir" class="tab-content flex-1 flex flex-col md:flex-row overflow-hidden">
            <section class="w-full md:w-[380px] bg-white border-r border-gray-200 flex flex-col shadow-sm">
                <div class="p-6 border-b border-gray-50">
                    <h2 class="font-bold text-gray-700 mb-4">Detail Pesanan</h2>
                    <select class="w-full p-2 bg-gray-50 border-none rounded-lg text-sm text-gray-500 outline-none focus:ring-1 focus:ring-green-500 cursor-pointer">
                        <option>Pilih Pelayan</option>
                        <option selected></option>
                    </select>
                </div>

                <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                    </div>

                <div class="p-6 bg-gray-50 border-t space-y-3">
                    <div class="flex justify-between text-gray-600 text-sm font-medium">
                        <span>Subtotal</span>
                        <span id="subtotal">Rp 0</span>
                    </div>
                    <div class="flex justify-between font-black text-xl border-t pt-2 text-gray-800">
                        <span>Total</span>
                        <span id="cartTotal">Rp 0</span>
                    </div>

                    <div class="pt-2">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Uang Tunai</label>
                        <input type="number" id="cashInput" oninput="calculateChange()" 
                            class="w-full p-3 rounded-xl border-2 border-gray-200 focus:border-green-500 outline-none font-bold text-lg transition-all" 
                            placeholder="0">
                    </div>

                    <div class="flex justify-between items-center p-3 bg-green-100 rounded-xl">
                        <span class="text-green-700 text-sm font-bold">Kembalian</span>
                        <span id="changeAmount" class="text-green-700 font-black text-lg">Rp 0</span>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="resetCart()" class="px-4 py-3 bg-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-300 transition">Reset</button>
                        <button onclick="checkout()" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-bold shadow-lg shadow-green-100 hover:bg-green-600 transition flex items-center justify-center gap-2">
                            <i class="fas fa-print"></i> Bayar & Cetak
                        </button>
                    </div>
                </div>
            </section>

            <section class="flex-1 flex flex-col overflow-hidden">
                <div class="p-6 space-y-4">
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" placeholder="Cari menu..." class="w-full pl-12 pr-4 py-3 bg-white rounded-2xl shadow-sm focus:ring-2 focus:ring-green-500 outline-none transition">
                    </div>
                    <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                        <button class="px-6 py-2 bg-green-500 text-white rounded-full text-sm font-semibold shadow-md shadow-green-100">Semua</button>
                        <button class="px-6 py-2 bg-white text-gray-500 rounded-full text-sm border border-gray-100 hover:bg-gray-50 transition">Makanan</button>
                        <button class="px-6 py-2 bg-white text-gray-500 rounded-full text-sm border border-gray-100 hover:bg-gray-50 transition">Minuman</button>
                    </div>
                </div>
                <div id="menuList" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 custom-scrollbar">
                    </div>
            </section>
        </div>

        <div id="stok" class="tab-content hidden flex-1 p-10 overflow-y-auto">
            <h2 class="text-2xl font-black text-gray-800 mb-6 uppercase tracking-tight">Manajemen Stok Bahan</h2>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-400 text-[10px] font-bold uppercase tracking-widest">
                        <tr>
                            <th class="p-5">Nama Bahan</th>
                            <th class="p-5">Jumlah Sisa</th>
                            <th class="p-5">Kondisi Stok</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable" class="divide-y divide-gray-50 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="kasir.js"></script>
</body>
</html>
