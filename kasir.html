<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Ayam Pencak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Samakan dengan Dashboard yang lancar */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #f8fafc;
        }

        /* Sidebar Sembunyi */
        .sidebar-collapsed {
            width: 0 !important;
            margin-left: -20px;
            overflow: hidden;
        }

        /* Paksa area scroll agar dikenali jempol Android */
        .scroll-container {
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important;
            touch-action: pan-y !important;
            height: 100%;
        }

        /* Tombol Buka Sidebar */
        #menu-toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            background: #c59f22;
            color: white;
            border-radius: 50%;
            display: none; /* Muncul via JS */
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <button id="menu-toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <aside id="main-sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 transition-all duration-300">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#c59f22] rounded-xl flex items-center justify-center shrink-0">
                    <img src="asset/logo.png" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div class="sidebar-content">
                    <h1 class="text-sm font-black text-gray-800 uppercase">Ayam Pencak</h1>
                    <p class="text-[10px] text-red-500 font-bold">POS SYSTEM</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-red-500">
                <i class="fas fa-times-circle text-xl"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-2">
            <a href="index.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-50">
                <i class="fas fa-chart-pie w-5"></i> <span class="sidebar-content">Dashboard</span>
            </a>
            <a href="kasir.html" class="flex items-center gap-4 px-4 py-3 rounded-xl bg-green-50 text-green-600 font-bold">
                <i class="fas fa-th-large w-5"></i> <span class="sidebar-content">Kasir</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-row overflow-hidden bg-gray-50">
        
        <section class="flex-1 flex flex-col min-w-0">
            <div class="p-4 shrink-0 bg-white border-b">
                <input type="text" placeholder="Cari menu..." class="w-full p-3 bg-gray-100 rounded-xl outline-none border focus:border-green-500">
            </div>
            
            <div class="scroll-container p-4">
                <div id="menuList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    </div>
            </div>
        </section>

        <section class="w-80 lg:w-96 bg-white border-l border-gray-200 flex flex-col shadow-xl">
            <div class="p-4 border-b font-bold shrink-0">Detail Pesanan</div>
            
            <div class="scroll-container flex-1 p-4" id="cartItems">
                </div>

            <div class="p-4 bg-gray-50 border-t shrink-0">
                <div class="flex justify-between font-black text-xl mb-4">
                    <span>Total</span>
                    <span id="cartTotal" class="text-green-600">Rp 0</span>
                </div>
                <input type="number" id="cashInput" class="w-full p-3 mb-3 border-2 rounded-xl text-center font-bold text-xl" placeholder="0">
                <button onclick="checkout()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black shadow-lg">
                    BAYAR & CETAK
                </button>
            </div>
        </section>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const btn = document.getElementById('menu-toggle-btn');
            
            sidebar.classList.toggle('sidebar-collapsed');
            
            if (sidebar.classList.contains('sidebar-collapsed')) {
                btn.style.display = 'flex';
            } else {
                btn.style.display = 'none';
            }
        }
    </script>
    <script src="data.js"></script>
    <script src="kasir.js"></script>
</body>
</html>
